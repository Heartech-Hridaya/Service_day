<div class="communications-container">
  <div class="header-actions">
    <h2>Communications</h2>
  </div>

  <div class="panel">
    <h3 class="panel-title">Compose Message</h3>
    
    <div class="form-group">
      <label>Recipients</label>
      <div class="segment-control" style="width: 300px; margin-bottom: 1rem;">
        <label class="segment">
          <input type="radio" name="scope" [(ngModel)]="recipientScope" value="all">
          <span>All Employees</span>
        </label>
        <label class="segment">
          <input type="radio" name="scope" [(ngModel)]="recipientScope" value="ngo">
          <span>Specific Activity</span>
        </label>
      </div>

      <select *ngIf="recipientScope === 'ngo'" [(ngModel)]="targetNgoId" class="select-input">
        <option [ngValue]="null" disabled>Select Activity...</option>
        <option *ngFor="let ngo of ngos$ | async" [value]="ngo.id">{{ngo.name}}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Message Content</label>
      <textarea [(ngModel)]="message" rows="4" placeholder="Write your message here..."></textarea>
    </div>

    <div class="form-group">
      <label>Timing</label>
      <select [(ngModel)]="timing" class="select-input" style="max-width: 300px;">
        <option value="immediate">Send Immediately</option>
        <option *ngIf="recipientScope === 'ngo'" value="1week">1 Week Before Event</option>
        <option *ngIf="recipientScope === 'ngo'" value="3days">3 Days Before Event</option>
        <option *ngIf="recipientScope === 'ngo'" value="1day">1 Day Before Event</option>
      </select>
    </div>

    <button class="btn-primary" (click)="sendMessage()">
      {{ timing === 'immediate' ? 'Send Message' : 'Schedule Message' }}
    </button>
  </div>

  <div class="panel">
    <h3 class="panel-title">Scheduled Messages</h3>
    <table class="ngo-table">
      <thead>
        <tr>
          <th>Message</th>
          <th>Recipient</th>
          <th>Scheduled For</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let msg of scheduledMessages$ | async">
          <td>{{msg.message}}</td>
          <td>{{msg.recipientUsername}}</td>
          <td>{{msg.triggerDate | date:'short'}}</td>
          <td>
            <span class="badge" [class.sent]="msg.sent" [class.pending]="!msg.sent">
              {{msg.sent ? 'Sent' : 'Pending'}}
            </span>
          </td>
          <td>
            <button *ngIf="!msg.sent" class="btn-cancel btn-sm" (click)="deleteMessage(msg.id)">Cancel</button>
          </td>
        </tr>
        <tr *ngIf="(scheduledMessages$ | async)?.length === 0">
          <td colspan="5" class="no-data">No scheduled messages.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
